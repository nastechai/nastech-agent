name: Brand Validation

# Scans every push and PR for leaked upstream strings that rebrand.py
# should have replaced. Also validates that rebrand.py's ruleset stays
# complete versus what actually appears in upstream.
# Fails loudly so nothing slips through to main.

"on":
  push:
    branches:
      - main
      - NasUpstream
      - 'upstream-pr-**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-branding:
    name: Scan for upstream brand leakage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Run brand validation scan
        id: scan
        run: |
          python3 .github/scripts/brand_validate.py \
            --report /tmp/brand-report.txt \
            --strict
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload brand report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brand-validation-report
          path: /tmp/brand-report.txt
          if-no-files-found: ignore

      - name: Post PR comment on violations
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(printf '## Brand Validation Failed\n\nUpstream strings were found that should have been rebranded.\n\n```\n%s\n```\n\nFix by running `.github/scripts/rebrand.py` on the affected content, or update the rebrand ruleset.' \
            "$(cat /tmp/brand-report.txt | head -80)")
          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || true

  validate-rebrand-ruleset:
    name: Validate rebrand.py ruleset vs upstream
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Fetch upstream main for ruleset comparison
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main --quiet --depth=1

      - name: Check rebrand.py ruleset completeness
        run: |
          python3 .github/scripts/brand_validate.py \
            --check-ruleset \
            --upstream-ref upstream/main \
            --report /tmp/ruleset-report.txt

      - name: Upload ruleset report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebrand-ruleset-report
          path: /tmp/ruleset-report.txt
          if-no-files-found: ignore
