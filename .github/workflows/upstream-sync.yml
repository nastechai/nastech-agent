name: Upstream Sync (hermes-agent → NasUpstream)

# Syncs NousResearch/hermes-agent into the NasUpstream branch with
# nastechai rebranding applied. Never touches main directly.
# You review the auto-opened PR and merge manually when ready.

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-sync even if upstream SHA is unchanged'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout nastech-agent (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "nastech-upstream-bot[bot]"
          git config user.email "nastech-upstream-bot@users.noreply.github.com"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main --quiet
          SHA=$(git rev-parse upstream/main)
          echo "UPSTREAM_SHA=$SHA"              >> $GITHUB_ENV
          echo "UPSTREAM_SHORT=${SHA:0:8}"      >> $GITHUB_ENV
          echo "Upstream HEAD: $SHA"

      - name: Read last synced SHA from NasUpstream
        id: last
        run: |
          LAST=""
          if git ls-remote --exit-code origin NasUpstream &>/dev/null; then
            git fetch origin NasUpstream --quiet
            LAST=$(git show origin/NasUpstream:.github/upstream-sync-sha 2>/dev/null || echo "")
          fi
          echo "sha=$LAST" >> $GITHUB_OUTPUT
          echo "Last synced SHA: ${LAST:-none}"

      - name: Decide whether sync is needed
        id: needed
        run: |
          if [ "$UPSTREAM_SHA" = "${{ steps.last.outputs.sha }}" ] \
             && [ "${{ inputs.force }}" != "true" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already up-to-date."
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Sync required: ${{ steps.last.outputs.sha }} -> $UPSTREAM_SHA"
          fi

      - name: Export upstream tree and apply nastechai rebranding
        if: steps.needed.outputs.needed == 'true'
        run: |
          WORK=$(mktemp -d)
          echo "WORK=$WORK" >> $GITHUB_ENV
          git archive upstream/main | tar -x -C "$WORK"
          python3 .github/scripts/rebrand.py "$WORK"
          echo "Rebranded upstream tree ready."

      - name: Switch to NasUpstream branch (create if missing)
        if: steps.needed.outputs.needed == 'true'
        run: |
          if git ls-remote --exit-code origin NasUpstream &>/dev/null; then
            git checkout -b NasUpstream origin/NasUpstream
          else
            # First run: branch from main so history is sensible
            git checkout -b NasUpstream origin/main
          fi

      - name: Replace branch content with rebranded upstream tree
        if: steps.needed.outputs.needed == 'true'
        run: |
          # Remove all tracked files
          git ls-files -z | xargs -0 -r git rm -f --quiet

          # Copy rebranded content in
          cp -r "$WORK"/. .

          # Restore nastechai-specific files that must never be
          # overwritten by upstream content:
          #   - Our fixed CI workflows
          #   - npm auth config
          #   - AUTHOR_MAP with nastechdebug@gmail.com entry
          git show origin/main:.github/workflows/ci.yml              > .github/workflows/ci.yml              2>/dev/null || true
          git show origin/main:.github/workflows/typecheck.yml        > .github/workflows/typecheck.yml        2>/dev/null || true
          git show origin/main:.github/workflows/upload_to_pypi.yml   > .github/workflows/upload_to_pypi.yml   2>/dev/null || true
          git show origin/main:.github/workflows/contributor-check.yml > .github/workflows/contributor-check.yml 2>/dev/null || true
          git show origin/main:.github/workflows/upstream-sync.yml     > .github/workflows/upstream-sync.yml     2>/dev/null || true
          git show origin/main:.github/workflows/upstream-pr-mirror.yml > .github/workflows/upstream-pr-mirror.yml 2>/dev/null || true
          git show origin/main:.npmrc                                  > .npmrc                                  2>/dev/null || true
          git show origin/main:scripts/release.py                      > scripts/release.py                      2>/dev/null || true
          git show origin/main:.github/scripts/rebrand.py              > .github/scripts/rebrand.py              2>/dev/null || true

          # Write tracking SHA
          mkdir -p .github
          echo "$UPSTREAM_SHA" > .github/upstream-sync-sha

          git add -A

          if git diff --cached --quiet; then
            echo "No net changes after restore overrides — branch is current."
          else
            git commit -m "sync: upstream hermes-agent @ $UPSTREAM_SHORT

Upstream: https://github.com/NousResearch/hermes-agent
SHA:      $UPSTREAM_SHA

Rebranding applied: hermes->nastech  NousResearch->NastechaiResearch
nastechai-specific overrides preserved (CI workflows, .npmrc, release.py).

Auto-generated by upstream-sync workflow. Review and merge manually."
          fi

          rm -rf "$WORK"

      - name: Push NasUpstream branch
        if: steps.needed.outputs.needed == 'true'
        run: |
          git push origin NasUpstream --force-with-lease \
            || git push origin NasUpstream --force

      - name: Create or update sync PR (NasUpstream -> main)
        if: steps.needed.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[NasUpstream] sync: hermes-agent @ $UPSTREAM_SHORT"
          BODY="## Upstream Sync — NousResearch/hermes-agent

| | |
|---|---|
| **Upstream SHA** | \`$UPSTREAM_SHA\` |
| **Source** | https://github.com/NousResearch/hermes-agent |
| **Branch** | \`NasUpstream\` |

### What's included
- All upstream commits from NousResearch/hermes-agent at this SHA
- nastechai rebranding applied (\`hermes\`→\`nastech\`, \`NousResearch\`→\`NastechaiResearch\`)
- nastechai-specific CI workflows, \`.npmrc\`, and \`scripts/release.py\` preserved

### Do NOT auto-merge — manual review required
- [ ] CI passes
- [ ] No leftover \`hermes\` / \`NousResearch\` strings in nastechai-facing content
- [ ] nastechai customisations intact
- [ ] Conflicts resolved

> Auto-updated every 4 hours. Merge is always your decision."

          EXISTING=$(gh pr list --head NasUpstream --base main \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "$TITLE" || true
            echo "Updated PR #$EXISTING"
          else
            gh pr create \
              --head NasUpstream --base main \
              --title "$TITLE" \
              --body "$BODY" \
              --label "upstream-sync" 2>/dev/null \
            || gh pr create \
              --head NasUpstream --base main \
              --title "$TITLE" \
              --body "$BODY"
            echo "Created sync PR"
          fi
