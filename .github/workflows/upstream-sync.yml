name: Upstream Sync (hermes-agent -> NasUpstream)

# Syncs NousResearch/hermes-agent into the NasUpstream branch with
# nastechai rebranding applied. Never touches main directly.
# You review the auto-opened PR and merge manually when ready.

"on":
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-sync even if upstream SHA is unchanged'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout nastech-agent (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "nastech-upstream-bot[bot]"
          git config user.email "nastech-upstream-bot@users.noreply.github.com"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main --quiet
          SHA=$(git rev-parse upstream/main)
          echo "UPSTREAM_SHA=$SHA"         >> "$GITHUB_ENV"
          echo "UPSTREAM_SHORT=${SHA:0:8}" >> "$GITHUB_ENV"
          echo "Upstream HEAD: $SHA"

      - name: Read last synced SHA from NasUpstream
        id: last
        run: |
          LAST=""
          if git ls-remote --exit-code origin NasUpstream &>/dev/null; then
            git fetch origin NasUpstream --quiet
            LAST=$(git show origin/NasUpstream:.github/upstream-sync-sha 2>/dev/null || echo "")
          fi
          echo "sha=$LAST" >> "$GITHUB_OUTPUT"
          echo "Last synced SHA: ${LAST:-none}"

      - name: Decide whether sync is needed
        id: needed
        run: |
          LAST="${{ steps.last.outputs.sha }}"
          FORCE="${{ inputs.force }}"
          if [ "$UPSTREAM_SHA" = "$LAST" ] && [ "$FORCE" != "true" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Sync required: $LAST -> $UPSTREAM_SHA"
          fi

      - name: Export upstream tree and apply nastechai rebranding
        if: steps.needed.outputs.needed == 'true'
        run: |
          WORK=$(mktemp -d)
          echo "WORK=$WORK" >> "$GITHUB_ENV"
          git archive upstream/main | tar -x -C "$WORK"
          python3 .github/scripts/rebrand.py "$WORK"
          echo "Rebranded upstream tree ready."

      - name: Switch to NasUpstream branch (create if missing)
        if: steps.needed.outputs.needed == 'true'
        run: |
          if git ls-remote --exit-code origin NasUpstream &>/dev/null; then
            git checkout -b NasUpstream origin/NasUpstream
          else
            git checkout -b NasUpstream origin/main
          fi

      - name: Replace branch content with rebranded upstream tree
        if: steps.needed.outputs.needed == 'true'
        run: |
          git ls-files -z | xargs -0 -r git rm -f --quiet
          cp -r "$WORK"/. .

          for f in \
            ".github/workflows/ci.yml" \
            ".github/workflows/typecheck.yml" \
            ".github/workflows/upload_to_pypi.yml" \
            ".github/workflows/contributor-check.yml" \
            ".github/workflows/upstream-sync.yml" \
            ".github/workflows/upstream-pr-mirror.yml" \
            ".github/workflows/brand-validation.yml" \
            ".github/workflows/bot-health-check.yml" \
            ".github/scripts/rebrand.py" \
            ".github/scripts/mirror_prs.py" \
            ".github/scripts/close_stale_mirrors.py" \
            ".github/scripts/brand_validate.py" \
            ".github/scripts/bot_health_check.py" \
            ".github/scripts/generate_sync_pr.py" \
            ".npmrc" \
            "scripts/release.py"; do
            content=$(git show "origin/main:$f" 2>/dev/null) || continue
            mkdir -p "$(dirname "$f")"
            printf '%s' "$content" > "$f"
          done

          mkdir -p .github
          printf '%s' "$UPSTREAM_SHA" > .github/upstream-sync-sha
          git add -A

          if git diff --cached --quiet; then
            echo "No net changes after applying overrides."
          else
            printf 'sync: upstream hermes-agent @ %s\n\nSHA: %s\nRebranding applied. Review and merge manually.\n' \
              "$UPSTREAM_SHORT" "$UPSTREAM_SHA" > /tmp/commit-msg.txt
            git commit -F /tmp/commit-msg.txt
          fi

          rm -rf "$WORK"

      - name: Push NasUpstream branch
        if: steps.needed.outputs.needed == 'true'
        run: |
          git push origin NasUpstream --force-with-lease \
            || git push origin NasUpstream --force

      - name: Generate PR body
        if: steps.needed.outputs.needed == 'true'
        run: python3 .github/scripts/generate_sync_pr.py

      - name: Create or update sync PR (NasUpstream to main)
        if: steps.needed.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[NasUpstream] sync: hermes-agent @ $UPSTREAM_SHORT"
          EXISTING=$(gh pr list --head NasUpstream --base main \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "$TITLE" || true
            echo "Updated existing PR #$EXISTING"
          else
            gh pr create \
              --head NasUpstream --base main \
              --title "$TITLE" \
              --body-file /tmp/pr-body.txt
            echo "Created new sync PR"
          fi
